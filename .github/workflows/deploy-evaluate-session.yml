name: Deploy evaluate-session

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/evaluate-session/**"
      - "supabase/functions/_shared/**"
      - ".github/workflows/deploy-evaluate-session.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy evaluate-session function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret."
            exit 1
          fi
          supabase functions deploy evaluate-session --project-ref "$SUPABASE_PROJECT_REF"
